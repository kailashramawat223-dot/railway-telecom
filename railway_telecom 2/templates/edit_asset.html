{% extends 'base.html' %}
{% block title %}Edit Asset · Railway Telecom AMS{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2 class="page-title"><i class="bi bi-pencil-square me-2"></i>Edit Asset</h2>
    <p class="page-subtitle">Update asset information for {{ asset.asset_id }}</p>
  </div>
  <a href="{{ url_for('view_asset', asset_id=asset.asset_id) }}" class="btn btn-rail-outline btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card-rail">
      <div class="card-rail-header">
        <i class="bi bi-cpu me-2"></i>Edit Details · <span class="text-muted">{{ asset.asset_id }}</span>
      </div>
      <div class="card-rail-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-rail">Asset Name <span class="text-danger">*</span></label>
              <input type="text" name="asset_name" class="form-control rail-input"
                     value="{{ asset.asset_name }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label-rail">Asset Type <span class="text-danger">*</span></label>
              <select name="asset_type" class="form-select rail-input" required>
                {% for t in ['Router','Switch','OFC Cable','Battery Bank','PA System','Communication Equipment'] %}
                  <option {% if asset.asset_type==t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label-rail">Station Name <span class="text-danger">*</span></label>
              <input type="text" name="station_name" class="form-control rail-input"
                     value="{{ asset.station_name }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label-rail">Installation Date</label>
              <input type="date" name="installation_date" class="form-control rail-input"
                     value="{{ asset.installation_date or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label-rail">Status <span class="text-danger">*</span></label>
              <select name="status" class="form-select rail-input" required>
                {% for s in ['Working','Faulty','Under Maintenance'] %}
                  <option {% if asset.status==s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary-rail">
              <i class="bi bi-save me-1"></i>Update Asset
            </button>
            <a href="{{ url_for('view_asset', asset_id=asset.asset_id) }}" class="btn btn-rail-outline">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
